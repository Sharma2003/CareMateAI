name: caremate

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  web:
    build: .
    container_name: caremate_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads        # persist avatars & documents
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caremate_net

  # ── RQ Worker (background report generation) ─────────────────────────────────
  worker:
    build: .
    container_name: caremate_worker
    restart: unless-stopped
    command: python -m rq_worker.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caremate_net

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: caremate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                      # expose for local DB clients / migrations
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - caremate_net

  # ── Redis 7 (LangGraph checkpointing + RQ queue) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: caremate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - caremate_net

  # ── Ollama (MedGemma 27B) ─────────────────────────────────────────────────────
  # Pulls and serves the model locally.
  # GPU passthrough is commented out by default — uncomment the `deploy` block
  # if you are on a Linux host with the NVIDIA Container Toolkit installed.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: caremate_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama        # persist downloaded model weights
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   networks:
  #     - caremate_net

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:
  ollama_data:

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  caremate_net:
    driver: bridge